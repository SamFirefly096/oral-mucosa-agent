# ============================================================
#  GitHub Actions — 推送即部署
#  当代码推送到 main 分支时，自动 SSH 到服务器执行更新
#
#  使用前需要在 GitHub 仓库 Settings → Secrets 中配置:
#   - SSH_HOST: 云服务器 IP
#   - SSH_USER: SSH 用户名 (如 root)
#   - SSH_KEY:  SSH 私钥 (cat ~/.ssh/id_ed25519)
#   - SSH_PORT: SSH 端口 (默认 22)
# ============================================================
name: Deploy to Cloud Server

on:
  push:
    branches: [main, master]
  # 也支持手动触发 (GitHub Actions 页面 → Run workflow)
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /opt/oral-mucosa-agent

            # 备份当前版本
            mkdir -p /opt/oral-mucosa-backups
            BACKUP_DIR="/opt/oral-mucosa-backups/$(date +%Y%m%d_%H%M%S)"
            cp -r . "$BACKUP_DIR" 2>/dev/null || true
            # 只保留最近 5 个备份
            ls -dt /opt/oral-mucosa-backups/*/ 2>/dev/null | tail -n +6 | xargs rm -rf 2>/dev/null || true

            # 拉取最新代码
            git fetch origin
            git reset --hard origin/main

            # 安装依赖
            pip3 install -r requirements.txt -q

            # 重启服务
            sudo systemctl restart oral-mucosa
            sleep 3

            # 健康检查
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5000/api/cases --max-time 5)
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "401" ]; then
              echo "✓ Deploy OK (HTTP $HTTP_CODE)"
            else
              echo "✗ Health check failed (HTTP $HTTP_CODE), rolling back..."
              rsync -av --delete "$BACKUP_DIR/" ./
              sudo systemctl restart oral-mucosa
              echo "Rolled back to backup"
              exit 1
            fi
