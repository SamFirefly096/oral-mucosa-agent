# Nginx 反向代理配置
# 部署路径: /etc/nginx/conf.d/oral-mucosa.conf 或 /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name your-domain.com;          # ← 替换为实际域名

    # 上传限制
    client_max_body_size 20M;
    proxy_read_timeout 120s;

    # 日志
    access_log /var/log/nginx/oral-mucosa-access.log;
    error_log  /var/log/nginx/oral-mucosa-error.log;

    # 安全头
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";

    # 静态文件 — nginx 直接提供，不经过 Flask
    location /app.js   { alias /app/web/app.js; expires 1d; }
    location /index.html { alias /app/web/index.html; expires 1d; }
    location /login.html { alias /app/web/login.html; expires 1d; }

    # API 反向代理到 Flask
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

