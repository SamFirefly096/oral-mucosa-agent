<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>口腔黏膜病AI诊断Agent</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{--blue:#2563eb;--blue-dark:#1d4ed8;--bg:#f0f2f5;--white:#fff;--text:#1a1a2e;--gray:#666;--border:#e5e7eb;--radius:12px}

body{font-family:'Microsoft YaHei','PingFang SC',-apple-system,sans-serif;background:var(--bg);min-height:100vh;min-height:100dvh}

/* Header */
.header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.15);position:sticky;top:0;z-index:50}
.header h1{font-size:18px;font-weight:600}
.header .subtitle{font-size:10px;opacity:.8;margin-top:2px}
.header .svc{font-size:10px;opacity:.7;display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:12px}

/* Container */
.container{max-width:1100px;margin:12px auto;padding:0 12px}

/* Tabs */
.tabs{display:flex;background:var(--white);border-radius:var(--radius) var(--radius) 0 0;overflow:hidden;box-shadow:0 -1px 4px rgba(0,0,0,.05)}
.tab{flex:1;padding:12px 16px;text-align:center;cursor:pointer;font-size:14px;font-weight:600;border:none;background:#f8f9fb;color:#888;transition:all .2s;border-bottom:3px solid transparent}
.tab.active{background:var(--white);color:var(--text);border-bottom-color:var(--blue)}
.tab .icon{font-size:18px;display:block;margin-bottom:2px}

/* Panel */
.panel{background:var(--white);border-radius:0 0 var(--radius) var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.08);overflow:hidden}

/* Chat */
.chat-area{height:420px;overflow-y:auto;padding:16px;scroll-behavior:smooth}
.chat-area.training{background:linear-gradient(135deg,#fefce8 0%,#fafbfc 100%)}
.chat-area.consult{background:linear-gradient(135deg,#eff6ff 0%,#fafbfc 100%)}

.message{display:flex;margin-bottom:10px;animation:fadeIn .3s}
.message.student{justify-content:flex-end}
.message.patient,.message.doctor{justify-content:flex-start}
.message.system{justify-content:flex-start}

.bubble{max-width:72%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.65;word-wrap:break-word}
.message.student .bubble{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
.message.patient .bubble{background:#fff;color:#333;border:1.5px solid #e0e4ea;border-bottom-left-radius:4px}
.message.doctor .bubble{background:#dbeafe;color:var(--text);border:1.5px solid #bfdbfe;border-bottom-left-radius:4px}
.message.system .bubble{background:#f5f3ff;color:#4c1d95;border:1.5px solid #c4b5fd;font-size:11px;max-width:90%}
.message.system .bubble .role-label{color:#7c3aed}
.bubble .role-label{font-size:9px;font-weight:700;margin-bottom:3px;opacity:.7}

.bubble h4{font-size:13px;margin:4px 0;color:inherit}
.bubble ul{margin:4px 0 4px 16px;padding:0}
.bubble li{margin:2px 0;font-size:12px}
.bubble code{background:rgba(0,0,0,.06);padding:1px 4px;border-radius:3px;font-size:11px}
.bubble strong{font-weight:700}

/* Input */
.input-area{display:flex;padding:10px 14px;border-top:1px solid var(--border);background:var(--white);gap:6px;align-items:center}
.input-area input{flex:1;padding:10px 14px;border:1.5px solid #d0d5dd;border-radius:20px;font-size:13px;outline:none;min-width:0}
.input-area input:focus{border-color:var(--blue)}
.btn{padding:8px 16px;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:var(--blue-dark)}
.btn-primary:disabled{background:#94a3b8;cursor:not-allowed}
.btn-outline{background:var(--white);color:var(--blue);border:1.5px solid var(--blue)}
.btn-outline:hover{background:#eff6ff}
.btn-warn{background:#fef3c7;color:#92400e;border:1.5px solid #fcd34d}
.btn-warn:hover{background:#fde68a}

/* Case selector */
.case-selector{padding:10px 14px;background:#fffbeb;border-bottom:1px solid #fde68a;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.case-selector label{font-size:11px;font-weight:600;color:#92400e;white-space:nowrap}
.case-selector select{padding:7px 10px;border:1.5px solid #fcd34d;border-radius:8px;font-size:12px;background:#fff;min-width:160px;max-width:200px}

/* Status bar */
.status-bar{display:none;align-items:center;gap:10px;padding:6px 14px;background:#f8f9fb;border-bottom:1px solid var(--border);font-size:11px;color:var(--gray)}
.status-bar .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-bar .dot.active{background:#4ade80}
.status-bar .dot.idle{background:#fbbf24}
.status-bar span:last-child{margin-left:auto;font-weight:600}

/* Exam toolbar */
.exam-toolbar{display:none;padding:8px 14px;border-top:1px solid var(--border);background:#f8f9fb;flex-wrap:wrap;align-items:center;gap:5px}
.exam-toolbar .tt{font-size:11px;font-weight:700;color:var(--gray)}
.btn-exam{padding:5px 10px;font-size:10px;font-weight:600;border:1.5px solid #c4b5fd;background:#faf5ff;color:#5b21b6;border-radius:14px;cursor:pointer;transition:all .15s}
.btn-exam:hover{background:#ede9fe;border-color:#8b5cf6}

/* Dropdown */
.dropdown{position:relative;display:inline-block}
.dropdown-menu{display:none;position:absolute;bottom:100%;left:0;z-index:50;background:#fff;border:1.5px solid #d0d5dd;border-radius:8px;padding:8px;min-width:180px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-height:300px;overflow-y:auto}
.dropdown-menu.show{display:block}
.dropdown-menu label{display:block;padding:3px 6px;font-size:11px;cursor:pointer;border-radius:4px}
.dropdown-menu label:hover{background:#f5f3ff}
.dropdown-menu .dd-confirm{position:sticky;bottom:0;background:#fff;padding-top:6px;border-top:1px solid #eee;margin-top:4px}

/* Score panel */
.score-panel{display:none;padding:14px;border-top:2px solid var(--blue);background:#f8faff;max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.score-panel.show{display:block}
.score-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}
.score-item{background:#fff;padding:10px;border-radius:8px;text-align:center;border:1px solid #e0e4ea}
.score-item .score-val{font-size:20px;font-weight:700}
.score-item .score-lbl{font-size:10px;color:#666;margin-top:2px}
.score-item.great{background:#f0fdf4;border-color:#86efac}
.score-item.good{background:#eff6ff;border-color:#93c5fd}
.score-item.ok{background:#fffbeb;border-color:#fcd34d}
.score-item.poor{background:#fef2f2;border-color:#fca5a5}

.grade-badge{display:inline-block;padding:3px 14px;border-radius:12px;font-size:16px;font-weight:800;margin-right:8px}
.grade-A{background:#f0fdf4;color:#15803d}
.grade-B{background:#eff6ff;color:#1d4ed8}
.grade-C{background:#fffbeb;color:#a16207}
.grade-D{background:#fef2f2;color:#dc2626}

.truth-box{margin-top:10px;padding:10px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;font-size:12px;line-height:1.7}
.truth-box h4{font-size:13px;color:#166534;margin-bottom:4px}

/* Modal */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:100;justify-content:center;align-items:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:17px;margin-bottom:12px;color:var(--text)}
.modal label{display:block;font-size:12px;font-weight:600;color:#333;margin-bottom:3px;margin-top:12px}
.modal textarea,.modal input{width:100%;padding:10px 12px;border:1.5px solid #d0d5dd;border-radius:8px;font-size:13px;font-family:inherit;resize:vertical}
.modal textarea{min-height:60px}
.modal textarea:focus,.modal input:focus{border-color:var(--blue);outline:none}
.modal .btn-row{display:flex;gap:8px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}

/* Empty state */
.empty-state{text-align:center;padding:40px 16px;color:#999}
.empty-state .icon{font-size:36px;margin-bottom:8px}

/* Spinner */
.spinner{width:32px;height:32px;border:3px solid #e0e4ea;border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
.spinner-sm{display:inline-block;width:14px;height:14px;border:2px solid #ddd;border-top-color:#7c3aed;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Responsive */
@media(max-width:768px){
  .header{padding:10px 14px}
  .header h1{font-size:16px}
  .header .subtitle{display:none}
  .header .svc{font-size:9px}
  .container{margin:8px auto;padding:0 8px}
  .tabs{border-radius:8px 8px 0 0}
  .panel{border-radius:0 0 8px 8px}
  .chat-area{height:380px}
  .bubble{max-width:85%;font-size:12px}
  .case-selector{flex-direction:column;align-items:flex-start}
  .case-selector select{width:100%;max-width:100%}
  .score-grid{grid-template-columns:repeat(2,1fr)}
  .modal{padding:16px;border-radius:12px}
  .input-area{padding:8px 10px}
}

@media(max-width:480px){
  .chat-area{height:320px}
  .bubble{max-width:90%}
  .tab{font-size:12px;padding:10px 8px}
  .tab .icon{font-size:16px}
  .btn{padding:7px 12px;font-size:11px}
  .grade-badge{font-size:14px}
  .modal{padding:12px}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>&#x1F9B7; 口腔黏膜病AI诊断Agent</h1>
    <div class="subtitle">基于 DeepSeek V4 Pro — 中西医结合智能诊疗系统</div>
  </div>
  <div class="svc"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#4ade80"></span> 服务就绪</div>
</div>

<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="switchMode('training')"><span class="icon">&#x1F468;&#x200D;&#x2695;&#xFE0F;</span>医学生训练</button>
    <button class="tab" onclick="switchMode('consult')"><span class="icon">&#x1F3E5;</span>患者咨询</button>
  </div>

  <div class="panel">

    <!-- 病例选择器（仅训练模式） -->
    <div id="caseSelector" class="case-selector">
      <label>&#x1F4CB; 选择训练病例：</label>
      <select id="caseSelect" onchange="onCaseChange()"><option value="">-- 请选择病例 --</option></select>
      <button class="btn btn-outline" onclick="startTraining()" style="padding:6px 14px;font-size:11px">开始问诊</button>
    </div>

    <!-- 状态栏 -->
    <div id="statusBar" class="status-bar">
      <span class="dot active"></span><span id="statusText">问诊中</span>
      <span id="caseLabel"></span>
    </div>

    <!-- 聊天区 -->
    <div class="chat-area training" id="chatArea">
      <div class="empty-state"><div class="icon">&#x1F4AC;</div>
        <p><b>医学生训练模式</b></p>
        <p style="font-size:12px;color:#888;margin-top:4px">选择病例开始模拟接诊。患者的诊断不会显示，请通过问诊自行判断。</p>
      </div>
    </div>

    <!-- 检查工具箱 -->
    <div id="examToolbar" class="exam-toolbar">
      <span class="tt">&#x1F52C; 工具箱:</span>
      <button class="btn-exam" onclick="requestExam('oral_exam')">&#x1F9B7; 口腔检查</button>
      <div class="dropdown" id="dd-lab">
        <button class="btn-exam" onclick="toggleDD('dd-lab')">&#x1F9EA; 化验 &#x25BE;</button>
        <div class="dropdown-menu">
          <label><input type="checkbox" value="cbc_wbc"> 血常规(WBC)</label>
          <label><input type="checkbox" value="esr"> 血沉(ESR)</label>
          <label><input type="checkbox" value="crp"> C反应蛋白(CRP)</label>
          <label><input type="checkbox" value="ana"> 抗核抗体(ANA)</label>
          <label><input type="checkbox" value="anti_desmoglein_1"> 抗Dsg1</label>
          <label><input type="checkbox" value="anti_desmoglein_3"> 抗Dsg3</label>
          <label><input type="checkbox" value="anti_bp180"> 抗BP180</label>
          <label><input type="checkbox" value="anti_bp230"> 抗BP230</label>
          <div class="dd-confirm"><button class="btn btn-outline" onclick="requestExam('lab_tests');toggleDD('dd-lab')" style="padding:4px 12px;font-size:11px;width:100%">确认申请</button></div>
        </div>
      </div>
      <div class="dropdown" id="dd-micro">
        <button class="btn-exam" onclick="toggleDD('dd-micro')">&#x1F9EB; 微生物 &#x25BE;</button>
        <div class="dropdown-menu">
          <label><input type="checkbox" value="fungal_smear"> 真菌涂片</label>
          <label><input type="checkbox" value="fungal_culture"> 真菌培养</label>
          <label><input type="checkbox" value="hsv_pcr"> HSV PCR</label>
          <label><input type="checkbox" value="vzv_pcr"> VZV PCR</label>
          <div class="dd-confirm"><button class="btn btn-outline" onclick="requestExam('microbiology');toggleDD('dd-micro')" style="padding:4px 12px;font-size:11px;width:100%">确认申请</button></div>
        </div>
      </div>
      <button class="btn-exam" onclick="requestExam('pathology')">&#x1F52C; 病理</button>
      <button class="btn-exam" onclick="requestExam('tcm_diagnosis')">&#x1F9D1;&#x200D;&#x2695;&#xFE0F; 中医四诊</button>
    </div>

    <!-- 输入区 -->
    <div class="input-area">
      <input type="text" id="msgInput" placeholder="输入问诊内容..." disabled onkeypress="if(event.key==='Enter')sendMessage()">
      <button class="btn btn-primary" id="sendBtn" onclick="sendMessage()" disabled>发送</button>
      <button class="btn btn-warn" id="endBtn" onclick="endConsultation()" style="display:none">&#x2714; 结束</button>
      <button class="btn btn-outline" onclick="resetSession()">&#x1F504; 重置</button>
    </div>

    <!-- 评分面板 -->
    <div class="score-panel" id="scorePanel">
      <div style="display:flex;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px">
        <h3 style="margin:0">&#x1F4CA; 诊断评估结果</h3>
        <span class="grade-badge" id="gradeBadge">-</span>
        <span style="font-size:15px;font-weight:700" id="totalScore">总分: -</span>
      </div>
      <div class="score-grid">
        <div class="score-item" id="scoreDiag"><div class="score-val">-</div><div class="score-lbl">西医诊断 (45%)</div></div>
        <div class="score-item" id="scoreTCM"><div class="score-val">-</div><div class="score-lbl">中医辨证 (25%)</div></div>
        <div class="score-item" id="scoreTreat"><div class="score-val">-</div><div class="score-lbl">治疗方案 (20%)</div></div>
        <div class="score-item" id="scoreEff"><div class="score-val">-</div><div class="score-lbl">问诊效率 (10%)</div></div>
      </div>
      <div class="truth-box">
        <h4>&#x1F4D6; 标准答案（仅训练可见）</h4>
        <div id="truthContent"></div>
      </div>
      <div style="margin-top:10px">
        <button class="btn btn-outline" id="tutorBtn" onclick="getTutorReview()" style="width:100%">&#x1F468;&#x200D;&#x1F3EB; 导师点评</button>
      </div>
      <div id="tutorReview" style="margin-top:10px;padding:10px;background:#fefce8;border-radius:8px;border:1px solid #fde68a;font-size:13px;line-height:1.7;display:none;max-height:200px;overflow-y:auto"></div>
    </div>

  </div>
</div>

<!-- 诊断表单弹窗 -->
<div class="modal-overlay" id="diagModal">
  <div class="modal">
    <h3>&#x1F4DD; 请给出您的诊断和治疗方案</h3>
    <p style="font-size:12px;color:#888;margin-bottom:10px">基于刚才的问诊对话，填写以下内容。系统将自动评分。</p>
    <label>1. 西医诊断（主要诊断名称）</label>
    <input type="text" id="diagInput" placeholder="例如：糜烂型口腔扁平苔藓">
    <label>2. 中医辨证分型</label>
    <input type="text" id="tcmInput" placeholder="例如：肝郁气滞，兼有血瘀证（若无中医数据可留空）">
    <label>3. 治疗方案（局部+全身用药要点）</label>
    <textarea id="treatInput" placeholder="例如：曲安奈德软膏bid外用；泼尼松20mg qd口服"></textarea>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="submitDiagnosis()">提交评分</button>
    </div>
  </div>
</div>

<script src="app.js?v=20260708"></script>
</body>
</html>
