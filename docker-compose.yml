version: "3.8"

services:
  app:
    build: .
    container_name: oral-mucosa-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-20260705}
      - PORT=5000
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./cases_photos:/app/cases_photos:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/cases', data=b'')"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Nginx 反向代理（可选，也可使用宿主机 nginx）
  nginx:
    image: nginx:alpine
    container_name: oral-mucosa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
